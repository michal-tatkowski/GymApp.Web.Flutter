name: gymapp_web
description: "GymApp — mobile app for gym & social features."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.1

  # Storage
  flutter_secure_storage: ^9.2.4

  # Logging
  logger: ^2.4.0

  # Utils
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
